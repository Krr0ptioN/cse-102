name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install lint tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install ruff

      - name: Run Ruff (critical rules)
        run: ruff check app --select E9,F63,F7,F82

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt -r app/requirements-dev.txt

      - name: Compile sources
        run: python -m compileall app/main.py app/db app/services app/repositories app/ui app/scripts app/tests

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            app/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r app/requirements.txt -r app/requirements-dev.txt

      - name: Run tests
        env:
          PYTHONPATH: .
        run: python -m pytest app/tests
